name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r backend/requirements.txt

      - name: Run Python tests
        run: >-
          python -m pytest
          tests/test_backend.py
          tests/sandbox/test_visualization.py
          tests/test_observability.py
          tests/test_flatland_manager.py
          tests/test_strategy.py
          tests/test_sociologist.py
          tests/test_sandbox.py
          -q

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run frontend build
        run: npm run build
        working-directory: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend docker image
        run: docker build -f Dockerfile.backend -t agiseed-backend .

      - name: Build frontend docker image
        run: docker build -f Dockerfile.frontend -t agiseed-frontend .

      - name: Run docker compose and smoke test
        run: |
          docker compose up -d
          sleep 10
          curl --fail http://localhost:8000/health
          curl --fail http://localhost:4173
          # Install Playwright browsers and run E2E tests against the running services
          npm --prefix frontend install
          npx playwright install --with-deps
          npm --prefix frontend run test:e2e
          docker compose down
