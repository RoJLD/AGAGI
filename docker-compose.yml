version: '3.9'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '8000:8000'
    volumes:
      - ./results:/app/results
      - ./data:/app/data
      - ./src:/app/src

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '4173:4173'
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
